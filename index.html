    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            font-family: 'Arial', sans-serif;
            background-color: #000;
            color: white;
            display: flex;
            justify-content: center;

        .background {

            transform: scale(1.1);
        }

        .container {
            width: 90%;
            max-width: 400px;
        }

        h1 {
            font-size: 2.2rem;
            margin-bottom: 5px;
            text-transform: uppercase;
        }

        .subtitle {
            font-size: 1rem;
            color: #ccc;

        }

        .countdown {

            color: #aaa;
            margin-bottom: 35px;
        }

        .join-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: transparent;
            color: white;
            text-decoration: none;
            border: 2px solid white;
            padding: 18px 20px;
            border-radius: 50px;
            font-size: 1.1rem;
            font-weight: bold;
            width: 100%;

            transition: all 0.3s ease;

    <script>
        let count = 42;
        const timerDisplay = document.getElementById('timer');
        const countdownInterval = setInterval(() => {
            if(count > 1) {
                count--;
                timerDisplay.innerText = count;
            } else {
                clearInterval(countdownInterval);
            }
        }, 1000);
    </script>
